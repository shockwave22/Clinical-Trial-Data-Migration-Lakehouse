resources:
  jobs:
    clinical_migration_pipeline:
      name: clinical-migration-pipeline-${bundle.target}
      max_concurrent_runs: 1
      tasks:
        - task_key: bronze_ingestion
          notebook_task:
            notebook_path: ${var.REPO_ROOT}/notebooks/01_bronze_ingestion.py
          new_cluster:
            spark_version: 15.4.x-scala2.12
            node_type_id: Standard_DS3_v2
            num_workers: 1

        - task_key: silver_conformance
          depends_on:
            - task_key: bronze_ingestion
          notebook_task:
            notebook_path: ${var.REPO_ROOT}/notebooks/02_silver_conformance.py
          existing_cluster_id: ${env.DATABRICKS_CLUSTER_ID}

        - task_key: gold_exports
          depends_on:
            - task_key: silver_conformance
          notebook_task:
            notebook_path: ${var.REPO_ROOT}/notebooks/03_gold_netsuite_export.py
          existing_cluster_id: ${env.DATABRICKS_CLUSTER_ID}

        - task_key: entity_resolution
          depends_on:
            - task_key: silver_conformance
          notebook_task:
            notebook_path: ${var.REPO_ROOT}/notebooks/04_entity_resolution.py
          existing_cluster_id: ${env.DATABRICKS_CLUSTER_ID}

        - task_key: delta_processing
          depends_on:
            - task_key: gold_exports
            - task_key: entity_resolution
          notebook_task:
            notebook_path: ${var.REPO_ROOT}/notebooks/06_delta_load_processing.ipynb
          existing_cluster_id: ${env.DATABRICKS_CLUSTER_ID}

        - task_key: reconciliation_dashboard
          depends_on:
            - task_key: delta_processing
          notebook_task:
            notebook_path: ${var.REPO_ROOT}/notebooks/07_reconciliation_dashboard.ipynb
          existing_cluster_id: ${env.DATABRICKS_CLUSTER_ID}
